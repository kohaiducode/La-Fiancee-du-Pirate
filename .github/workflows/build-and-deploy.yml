name: Build and Deploy Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'src/assets/images/**'
      - '.pages.yml'
      - 'README.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install required Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # 4. Optimize newly uploaded photos to WebP
      - name: Optimize images
        run: python optimize_images.py

      # 5. Compile site pages into /docs/
      - name: Build site
        run: python build.py

      # 6. Commit and push built files back to main branch
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if there are changes in docs/ or assets/images/ to commit
          if [ -n "$(git status --porcelain docs/ src/assets/images/)" ]; then
            git add docs/ src/assets/images/
            git commit -m "Auto-compile site and optimize images [skip ci]"
            git push origin main
          else
            echo "No compiled changes to commit."
          fi
