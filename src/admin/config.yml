backend:
  name: github
  repo: kohaiducode/La-Fiancee-du-Pirate
  branch: main
  pkce: true
  app_id: "Ov23li1J9CHmInhZTTxk"
  base_url: "https://kohaiducode.github.io"

# Configuration de la gestion des médias
media_folder: Photos
public_folder: /Photos

# Configuration de l'i18n globale
i18n:
  structure: multiple_files
  locales: [fr, en, en-au, de, it, es, ru]
  default_locale: fr
  omit_default_locale_from_file_path: false

collections:
  - name: seo
    label: "1. Référencement (SEO)"
    i18n:
      structure: single_file
      locales: [fr, en, en-au, de, it, es, ru]
    extension: json
    format: json
    files:
      - name: accueil
        label: "Page d'Accueil"
        file: "src/translations/seo/accueil"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: seo
            label: "Métadonnées"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Google - Accueil", name: home_title, widget: string, i18n: true }
              - { label: "Description Google - Accueil", name: home_desc, widget: text, i18n: true }

      - name: chambres
        label: "Page Chambres & Pavillons"
        file: "src/translations/seo/chambres"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: seo
            label: "Métadonnées"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Google - Chambres", name: rooms_title, widget: string, i18n: true }
              - { label: "Description Google - Chambres", name: rooms_desc, widget: text, i18n: true }

      - name: services
        label: "Page Services & Activités"
        file: "src/translations/seo/services"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: seo
            label: "Métadonnées"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Google - Services", name: services_title, widget: string, i18n: true }
              - { label: "Description Google - Services", name: services_desc, widget: text, i18n: true }

      - name: galerie
        label: "Page Galerie"
        file: "src/translations/seo/galerie"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: seo
            label: "Métadonnées"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Google - Galerie", name: gallery_title, widget: string, i18n: true }
              - { label: "Description Google - Galerie", name: gallery_desc, widget: text, i18n: true }

      - name: contact
        label: "Page Contact"
        file: "src/translations/seo/contact"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: seo
            label: "Métadonnées"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Google - Contact", name: contact_title, widget: string, i18n: true }
              - { label: "Description Google - Contact", name: contact_desc, widget: text, i18n: true }

  - name: navigation
    label: "2. En-tête & Pied de page"
    i18n:
      structure: single_file
      locales: [fr, en, en-au, de, it, es, ru]
    extension: json
    format: json
    files:
      - name: layout
        label: "Configuration En-tête & Pied de page"
        file: "src/translations/navigation/index"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: nav
            label: "Menu de Navigation"
            widget: object
            i18n: true
            fields:
              - { label: "Accueil", name: home, widget: string, i18n: true }
              - { label: "Chambres", name: rooms, widget: string, i18n: true }
              - { label: "Services & Activités", name: services, widget: string, i18n: true }
              - { label: "Galerie", name: gallery, widget: string, i18n: true }
              - { label: "Contact", name: contact, widget: string, i18n: true }
              - { label: "Bouton Réserver (Header)", name: book, widget: string, i18n: true }
          - name: hero
            label: "Bannière d'Accueil (Hero Slider)"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Principal", name: title, widget: string, i18n: true }
              - { label: "Sous-titre", name: subtitle, widget: string, i18n: true }
              - { label: "Texte du bouton d'action", name: cta, widget: string, i18n: true }
          - name: booking_bar
            label: "Barre de Réservation"
            widget: object
            i18n: true
            fields:
              - { label: "Arrivée", name: check_in, widget: string, i18n: true }
              - { label: "Départ", name: check_out, widget: string, i18n: true }
              - { label: "Voyageurs", name: guests, widget: string, i18n: true }
              - { label: "Bouton de recherche", name: search, widget: string, i18n: true }
          - name: footer
            label: "Pied de page (Footer)"
            widget: object
            i18n: true
            fields:
              - { label: "Description Sous-Logo", name: desc, widget: text, i18n: true }
              - { label: "Titre Navigation", name: links_title, widget: string, i18n: true }
              - { label: "Titre Contact", name: contact_title, widget: string, i18n: true }
              - { label: "Titre Suivez-nous", name: social_title, widget: string, i18n: true }
              - { label: "Droits Réservés", name: rights, widget: string, i18n: true }

  - name: pages
    label: "3. Pages"
    i18n:
      structure: single_file
      locales: [fr, en, en-au, de, it, es, ru]
    extension: json
    format: json
    files:
      - name: accueil
        label: "Page d'Accueil"
        file: "src/translations/pages/accueil"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: accueil
            label: "Contenu"
            widget: object
            i18n: true
            fields:
              - { label: "Titre d'Introduction", name: intro_title, widget: string, i18n: true }
              - { label: "Texte d'Introduction (P1)", name: intro_text, widget: text, i18n: true }
              - { label: "Texte d'Introduction (P2)", name: intro_subtext, widget: text, i18n: true }
              - { label: "Carte 1 (Vue) - Photo", name: card_view_image, widget: image, i18n: duplicate }
              - { label: "Carte 1 (Vue) - Titre", name: card_view_title, widget: string, i18n: true }
              - { label: "Carte 1 (Vue) - Texte", name: card_view_text, widget: text, i18n: true }
              - { label: "Carte 2 (Piscine) - Photo", name: card_pool_image, widget: image, i18n: duplicate }
              - { label: "Carte 2 (Piscine) - Titre", name: card_pool_title, widget: string, i18n: true }
              - { label: "Carte 2 (Piscine) - Texte", name: card_pool_text, widget: text, i18n: true }
              - { label: "Carte 3 (Déjeuner) - Photo", name: card_breakfast_image, widget: image, i18n: duplicate }
              - { label: "Carte 3 (Déjeuner) - Titre", name: card_breakfast_title, widget: string, i18n: true }
              - { label: "Carte 3 (Déjeuner) - Texte", name: card_breakfast_text, widget: text, i18n: true }
              - { label: "Carte 4 (Emplacement) - Photo", name: card_location_image, widget: image, i18n: duplicate }
              - { label: "Carte 4 (Emplacement) - Titre", name: card_location_title, widget: string, i18n: true }
              - { label: "Carte 4 (Emplacement) - Texte", name: card_location_text, widget: text, i18n: true }
              - { label: "Teaser Chambres - Titre", name: explore_rooms_title, widget: string, i18n: true }
              - { label: "Teaser Chambres - Texte", name: explore_rooms_text, widget: text, i18n: true }

      - name: chambres
        label: "Page Chambres"
        file: "src/translations/pages/chambres"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: rooms
            label: "Contenu"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Principal", name: title, widget: string, i18n: true }
              - { label: "Sous-titre", name: subtitle, widget: string, i18n: true }
              - { label: "Texte Bouton CTA", name: cta, widget: string, i18n: true }
              - { label: "Chambre Jardin - Photo", name: garden_image, widget: image, i18n: duplicate }
              - { label: "Chambre Jardin - Titre", name: garden_title, widget: string, i18n: true }
              - { label: "Chambre Jardin - Description", name: garden_desc, widget: text, i18n: true }
              - { label: "Chambre Jardin - Détails", name: garden_details, widget: text, i18n: true }
              - { label: "Chambre Vue Mer - Photo", name: mer_image, widget: image, i18n: duplicate }
              - { label: "Chambre Vue Mer - Titre", name: mer_title, widget: string, i18n: true }
              - { label: "Chambre Vue Mer - Description", name: mer_desc, widget: text, i18n: true }
              - { label: "Chambre Vue Mer - Détails", name: mer_details, widget: text, i18n: true }
              - { label: "Pavillons Suite - Photo", name: pavillons_image, widget: image, i18n: duplicate }
              - { label: "Pavillons Suite - Titre", name: pavillons_title, widget: string, i18n: true }
              - { label: "Pavillons Suite - Description", name: pavillons_desc, widget: text, i18n: true }
              - { label: "Pavillons Suite - Détails", name: pavillons_details, widget: text, i18n: true }
              - { label: "Titre Équipements", name: amenities_title, widget: string, i18n: true }
              - name: specs
                label: "Labels Spécifications"
                widget: object
                i18n: true
                fields:
                  - { label: "Superficie", name: size, widget: string, i18n: true }
                  - { label: "Capacité", name: capacity, widget: string, i18n: true }
                  - { label: "Literie", name: bed, widget: string, i18n: true }
                  - { label: "Wifi", name: wifi, widget: string, i18n: true }
                  - { label: "Plateau de courtoisie", name: courtesy, widget: string, i18n: true }
                  - { label: "Sèche-cheveux", name: hairdryer, widget: string, i18n: true }
                  - { label: "Produits d'accueil", name: products, widget: string, i18n: true }
              - { label: "Teaser Bas - Question", name: footer_question, widget: string, i18n: true }
              - { label: "Teaser Bas - Bouton", name: footer_cta, widget: string, i18n: true }

      - name: services
        label: "Page Services"
        file: "src/translations/pages/services"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: services
            label: "Contenu"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Principal", name: title, widget: string, i18n: true }
              - { label: "Sous-titre", name: subtitle, widget: string, i18n: true }
              - { label: "Services - Titre", name: hotel_services_title, widget: string, i18n: true }
              - { label: "Services - Desc", name: hotel_services_desc, widget: text, i18n: true }
              - { label: "Service 1 - Titre", name: service_pool_title, widget: string, i18n: true }
              - { label: "Service 1 - Desc", name: service_pool_desc, widget: text, i18n: true }
              - { label: "Service 2 - Titre", name: service_garden_title, widget: string, i18n: true }
              - { label: "Service 2 - Desc", name: service_garden_desc, widget: text, i18n: true }
              - { label: "Service 3 - Titre", name: service_breakfast_title, widget: string, i18n: true }
              - { label: "Service 3 - Desc", name: service_breakfast_desc, widget: text, i18n: true }
              - { label: "Activités - Titre", name: activities_title, widget: string, i18n: true }
              - { label: "Activités - Desc", name: activities_desc, widget: text, i18n: true }

      - name: galerie_textes
        label: "Page Galerie (Textes)"
        file: "src/translations/pages/galerie"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: gallery
            label: "Textes de la Galerie"
            widget: object
            i18n: true
            fields:
              - { label: "Titre de la Galerie", name: title, widget: string, i18n: true }
              - { label: "Sous-titre", name: subtitle, widget: string, i18n: true }
              - { label: "Filtre: Tout", name: filter_all, widget: string, i18n: true }
              - { label: "Filtre: Vue", name: filter_view, widget: string, i18n: true }
              - { label: "Filtre: Piscine", name: filter_pool, widget: string, i18n: true }
              - { label: "Filtre: Chambres", name: filter_rooms, widget: string, i18n: true }
              - { label: "Filtre: Petit-déjeuner", name: filter_breakfast, widget: string, i18n: true }

      - name: contact
        label: "Page Contact"
        file: "src/translations/pages/contact"
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
          - name: contact
            label: "Contenu"
            widget: object
            i18n: true
            fields:
              - { label: "Titre Principal", name: title, widget: string, i18n: true }
              - { label: "Sous-titre", name: subtitle, widget: string, i18n: true }
              - { label: "Titre Formulaire", name: form_title, widget: string, i18n: true }
              - { label: "Label: Nom", name: form_name, widget: string, i18n: true }
              - { label: "Label: Email", name: form_email, widget: string, i18n: true }
              - { label: "Label: Téléphone", name: form_phone, widget: string, i18n: true }
              - { label: "Label: Message", name: form_message, widget: string, i18n: true }
              - { label: "Bouton Envoyer", name: form_submit, widget: string, i18n: true }
              - { label: "Message de succès", name: form_success, widget: string, i18n: true }
              - { label: "Message d'erreur", name: form_error, widget: string, i18n: true }
              - { label: "Titre Coordonnées", name: info_title, widget: string, i18n: true }
              - { label: "Titre Adresse", name: info_address, widget: string, i18n: true }
              - { label: "Titre Plan d'accès", name: map_title, widget: string, i18n: true }

      - name: galerie
        label: "Galerie Photos"
        file: "src/translations/gallery/index"
        i18n: false  # Global management for easy alt tags next to image
        fields:
          - name: items
            label: "Liste des Photos de la Galerie"
            widget: list
            fields:
              - { label: "Photo (Image)", name: image, widget: image }
              - label: "Catégorie"
                name: category
                widget: select
                options:
                  - { label: "Vue", value: "view" }
                  - { label: "Piscine", value: "pool" }
                  - { label: "Chambres", value: "rooms" }
                  - { label: "Petit-déjeuner", value: "breakfast" }
              - { label: "Balise Alt SEO (Français)", name: alt_fr, widget: string }
              - { label: "Balise Alt SEO (English)", name: alt_en, widget: string }
              - { label: "Balise Alt SEO (English AU)", name: alt_en_au, widget: string }
              - { label: "Balise Alt SEO (Deutsch)", name: alt_de, widget: string }
              - { label: "Balise Alt SEO (Italiano)", name: alt_it, widget: string }
              - { label: "Balise Alt SEO (Español)", name: alt_es, widget: string }
              - { label: "Balise Alt SEO (Русский)", name: alt_ru, widget: string }

  - name: reviews
    label: "4. Témoignages (TripAdvisor)"
    folder: "src/translations/reviews"
    extension: json
    format: json
    i18n:
      structure: multiple_files
      locales: [fr, en, en-au, de, it, es, ru]
    create: true
    delete: true
    fields:
      - { label: "Nom de la Langue", name: title, widget: string, required: false, i18n: duplicate }
      - { label: "Nom du Client", name: author, widget: string, i18n: duplicate }
      - { label: "Date du séjour", name: date, widget: string, i18n: duplicate }
      - { label: "Note (sur 5)", name: rating, widget: number, i18n: duplicate }
      - name: review
        label: "Avis"
        widget: object
        i18n: true
        format: json
        extension: json
        fields:
          - { label: "Titre de l'avis", name: title, widget: string, i18n: true }
          - { label: "Message de l'avis", name: text, widget: text, i18n: true }
