<header class="main-header">
    <div class="header-container">
        <!-- Logo -->
        <a href="{{path_prefix}}{{lang}}/" class="logo-link" aria-label="La Fiancée du Pirate">
            <img src="{{path_prefix}}assets/images/logo/logo_pirate.webp" width="150" height="150" alt="La Fiancée du Pirate Logo" class="logo-img">
        </a>
        
        <!-- Navigation Menu -->
        <nav class="nav-menu" id="navMenu">
            <ul class="nav-list">
                <li class="nav-item"><a href="{{path_prefix}}{{lang}}/" class="nav-link {{active_home}}">{{nav.home}}</a></li>
                <li class="nav-item"><a href="{{path_prefix}}{{lang}}/chambres/" class="nav-link {{active_rooms}}">{{nav.rooms}}</a></li>
                <li class="nav-item"><a href="{{path_prefix}}{{lang}}/services/" class="nav-link {{active_services}}">{{nav.services}}</a></li>
                <li class="nav-item"><a href="{{path_prefix}}{{lang}}/galerie/" class="nav-link {{active_gallery}}">{{nav.gallery}}</a></li>
                <li class="nav-item"><a href="{{path_prefix}}{{lang}}/contact/" class="nav-link {{active_contact}}">{{nav.contact}}</a></li>
            </ul>
            <!-- Mobile Only Actions (Book & Lang) -->
            <div class="mobile-only-actions">
                <a href="{{booking_url}}" target="_blank" rel="noopener" class="btn btn-secondary btn-book-mobile">
                    {{nav.book}}
                </a>
                
                <div class="lang-selector">
                    <button class="lang-btn" aria-haspopup="true" aria-expanded="false" id="langBtnMobile">
                        <i class="fa-solid fa-globe"></i>
                        <span class="active-lang-code">{{lang_upper}}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <ul class="lang-dropdown" aria-labelledby="langBtnMobile" id="langDropdownMobile">
                        <li><a href="{{path_prefix}}fr/{{page_path}}" class="lang-dropdown-link {{active_lang_fr}}">FR</a></li>
                        <li><a href="{{path_prefix}}en/{{page_path}}" class="lang-dropdown-link {{active_lang_en}}">EN</a></li>
                        <li><a href="{{path_prefix}}de/{{page_path}}" class="lang-dropdown-link {{active_lang_de}}">DE</a></li>
                        <li><a href="{{path_prefix}}it/{{page_path}}" class="lang-dropdown-link {{active_lang_it}}">IT</a></li>
                        <li><a href="{{path_prefix}}es/{{page_path}}" class="lang-dropdown-link {{active_lang_es}}">ES</a></li>
                        <li><a href="{{path_prefix}}ru/{{page_path}}" class="lang-dropdown-link {{active_lang_ru}}">RU</a></li>
                        <li><a href="{{path_prefix}}en-au/{{page_path}}" class="lang-dropdown-link {{active_lang_en_au}}">EN-AU</a></li>
                    </ul>
                </div>
            </div>

            <!-- Mobile Contact Info -->
            <div class="mobile-contact-info">
                <div style="display: flex; gap: 1.5rem;">
                    <a href="tel:+33493766740" aria-label="Téléphone" style="color: var(--color-white); font-size: 1.8rem;"><i class="fa-solid fa-phone"></i></a>
                    <a href="mailto:info@fianceedupirate.com" aria-label="Email" style="color: var(--color-white); font-size: 1.8rem;"><i class="fa-solid fa-envelope"></i></a>
                    <a href="https://wa.me/33672003384" target="_blank" rel="noopener" aria-label="WhatsApp" style="color: var(--color-white); font-size: 1.8rem;"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
                <div class="mobile-social-links" style="display: flex; gap: 1.5rem;">
                    <a href="https://www.facebook.com/hotellafianceedupirate/" target="_blank" rel="noopener" aria-label="Facebook" style="color: var(--color-white); font-size: 1.8rem;"><i class="fa-brands fa-facebook"></i></a>
                    <a href="https://www.instagram.com/la_fiancee_du_pirate/" target="_blank" rel="noopener" aria-label="Instagram" style="color: var(--color-white); font-size: 1.8rem;"><i class="fa-brands fa-instagram"></i></a>
                </div>
            </div>
        </nav>

        <!-- Right Menu Actions (Language & Book CTA) -->
        <div class="header-actions">
            <!-- Language Selector -->
            <div class="lang-selector">
                <button class="lang-btn" aria-haspopup="true" aria-expanded="false" id="langBtn">
                    <i class="fa-solid fa-globe"></i>
                    <span class="active-lang-code">{{lang_upper}}</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <ul class="lang-dropdown" aria-labelledby="langBtn">
                    <li><a href="{{path_prefix}}fr/{{page_path}}" class="lang-dropdown-link {{active_lang_fr}}">FR</a></li>
                    <li><a href="{{path_prefix}}en/{{page_path}}" class="lang-dropdown-link {{active_lang_en}}">EN</a></li>
                    <li><a href="{{path_prefix}}de/{{page_path}}" class="lang-dropdown-link {{active_lang_de}}">DE</a></li>
                    <li><a href="{{path_prefix}}it/{{page_path}}" class="lang-dropdown-link {{active_lang_it}}">IT</a></li>
                    <li><a href="{{path_prefix}}es/{{page_path}}" class="lang-dropdown-link {{active_lang_es}}">ES</a></li>
                    <li><a href="{{path_prefix}}ru/{{page_path}}" class="lang-dropdown-link {{active_lang_ru}}">RU</a></li>
                    <li><a href="{{path_prefix}}en-au/{{page_path}}" class="lang-dropdown-link {{active_lang_en_au}}">EN-AU</a></li>
                </ul>
            </div>

            <!-- Header Booking CTA -->
            <a href="{{booking_url}}" target="_blank" rel="noopener" class="btn btn-secondary btn-book-header">
                {{nav.book}}
            </a>
            
            <!-- Mobile Menu Toggle -->
            <button class="mobile-menu-toggle" id="menuToggle" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </div>
</header>
