<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{meta_title}}</title>
    <meta name="description" content="{{meta_desc}}">
    
    <!-- SEO & Accessibility -->
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#1a2b49">
    
    <!-- Open Graph (Facebook/Instagram sharing) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{meta_title}}">
    <meta property="og:description" content="{{meta_desc}}">
    <meta property="og:image" content="{{path_prefix}}assets/images/accueil/hotel_view.webp">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{path_prefix}}assets/css/style.css">
    
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
