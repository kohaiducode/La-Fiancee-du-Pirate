# Configuration Pages CMS (pagescms.org) pour La Fiancée du Pirate

media:
  input: Photos
  output: /Photos

content:
  - name: seo
    label: "1. Référencement (SEO)"
    type: collection
    path: src/translations/seo
    extension: json
    view:
      primary: title
    fields:
      - name: title
        label: Nom de la Langue
        type: string
      - name: seo
        label: Métadonnées SEO (Google)
        type: object
        fields:
          - name: home_title
            label: Titre - Page d'Accueil
            type: string
          - name: home_desc
            label: Description - Page d'Accueil
            type: text
          - name: rooms_title
            label: Titre - Page Chambres
            type: string
          - name: rooms_desc
            label: Description - Page Chambres
            type: text
          - name: services_title
            label: Titre - Page Services
            type: string
          - name: services_desc
            label: Description - Page Services
            type: text
          - name: gallery_title
            label: Titre - Page Galerie
            type: string
          - name: gallery_desc
            label: Description - Page Galerie
            type: text
          - name: contact_title
            label: Titre - Page Contact
            type: string
          - name: contact_desc
            label: Description - Page Contact
            type: text

  - name: navigation
    label: "2. En-tête & Pied de page"
    type: collection
    path: src/translations/navigation
    extension: json
    view:
      primary: title
    fields:
      - name: title
        label: Nom de la Langue
        type: string
      - name: nav
        label: Menu de Navigation
        type: object
        fields:
          - name: home
            label: Accueil
            type: string
          - name: rooms
            label: Chambres
            type: string
          - name: services
            label: Services
            type: string
          - name: gallery
            label: Galerie
            type: string
          - name: contact
            label: Contact
            type: string
      - name: hero
        label: Bannière d'Accueil (Hero Banner)
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: cta
            label: Texte du Bouton d'Action
            type: string
      - name: booking_bar
        label: Barre de Réservation
        type: object
        fields:
          - name: check_in
            label: Label Date d'arrivée
            type: string
          - name: check_out
            label: Label Date de départ
            type: string
          - name: guests
            label: Label Voyageurs
            type: string
          - name: search
            label: Label Bouton Rechercher
            type: string
      - name: footer
        label: Pied de page (Footer)
        type: object
        fields:
          - name: desc
            label: Description Sous-Logo
            type: string
          - name: links_title
            label: Titre Liens Rapides
            type: string
          - name: contact_title
            label: Titre Section Contact
            type: string
          - name: social_title
            label: Titre Suivez-nous
            type: string
          - name: rights
            label: Label Droits Réservés
            type: string

  - name: pages
    label: "3. Contenu des Pages"
    type: collection
    path: src/translations/pages
    extension: json
    view:
      primary: title
    fields:
      - name: title
        label: Nom de la Langue
        type: string
      - name: accueil
        label: Page d'Accueil
        type: object
        fields:
          - name: intro_title
            label: Titre d'Introduction
            type: string
          - name: intro_text
            label: Texte d'Introduction (Paragraphe 1)
            type: text
          - name: intro_subtext
            label: Texte d'Introduction (Paragraphe 2)
            type: text
          - name: card_view_title
            label: Titre - Vue Panoramique
            type: string
          - name: card_view_text
            label: Texte - Vue Panoramique
            type: text
          - name: card_pool_title
            label: Titre - Piscine & Jardin
            type: string
          - name: card_pool_text
            label: Texte - Piscine & Jardin
            type: text
          - name: card_breakfast_title
            label: Titre - Petit-déjeuner Face Mer
            type: string
          - name: card_breakfast_text
            label: Texte - Petit-déjeuner Face Mer
            type: text
          - name: card_location_title
            label: Titre - Emplacement Idéal
            type: string
          - name: card_location_text
            label: Texte - Emplacement Idéal
            type: text

      - name: rooms
        label: Page Chambres & Tarifs
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: cta
            label: Bouton CTA
            type: string
          - name: garden_title
            label: Chambre Standard Jardin - Titre
            type: string
          - name: garden_desc
            label: Chambre Standard Jardin - Description
            type: text
          - name: mer_title
            label: Chambre Supérieure Mer - Titre
            type: string
          - name: mer_desc
            label: Chambre Supérieure Mer - Description
            type: text
          - name: pavillons_title
            label: Pavillon Suite - Titre
            type: string
          - name: pavillons_desc
            label: Pavillon Suite - Description
            type: text

      - name: services
        label: Page Services & Activités
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: hotel_services_title
            label: Titre Services de l'Hôtel
            type: string
          - name: hotel_services_desc
            label: Description Services de l'Hôtel
            type: text
          - name: service_pool_title
            label: Service - Piscine chauffée
            type: string
          - name: service_pool_desc
            label: Description - Piscine chauffée
            type: text
          - name: service_garden_title
            label: Service - Jardin
            type: string
          - name: service_garden_desc
            label: Description - Jardin
            type: text
          - name: service_breakfast_title
            label: Service - Petit-déjeuner
            type: string
          - name: service_breakfast_desc
            label: Description - Petit-déjeuner
            type: text

      - name: gallery
        label: Page Galerie (Filtres)
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: filter_all
            label: Filtre - Tout
            type: string
          - name: filter_view
            label: Filtre - Vue
            type: string
          - name: filter_pool
            label: Filtre - Piscine
            type: string
          - name: filter_rooms
            label: Filtre - Chambres
            type: string
          - name: filter_breakfast
            label: Filtre - Petit-déjeuner
            type: string

      - name: contact
        label: Page Contact
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: info_title
            label: Titre Section Coordonnées
            type: string
          - name: form_title
            label: Titre Formulaire
            type: string
          - name: form_submit
            label: Bouton Envoyer
            type: string

  - name: reviews
    label: "4. Témoignages (TripAdvisor)"
    type: collection
    path: src/translations/reviews
    extension: json
    view:
      primary: title
    fields:
      - name: title
        label: Nom de la Langue
        type: string
      - name: reviews
        label: Section TripAdvisor
        type: object
        fields:
          - name: title
            label: Titre Principal
            type: string
          - name: subtitle
            label: Sous-titre
            type: string
          - name: read_more
            label: Bouton Lire plus
            type: string
          - name: items
            label: Liste des Témoignages
            type: object
            list: true
            fields:
              - name: author
                label: Nom du Client
                type: string
              - name: date
                label: Date
                type: string
              - name: rating
                label: Note (sur 5)
                type: number
              - name: title
                label: Titre de l'avis
                type: string
              - name: text
                label: Message
                type: text

  - name: gallery
    label: "5. Galerie Photos"
    type: file
    path: src/data/gallery.json
    format: json
    fields:
      - name: items
        label: Liste des Photos
        type: object
        list: true
        fields:
          - name: image
            label: Photo (Image)
            type: image
          - name: category
            label: Catégorie
            type: select
            options:
              - value: view
                label: Vue
              - value: pool
                label: Piscine
              - value: rooms
                label: Chambres
              - value: breakfast
                label: Petit-déjeuner
          - name: alt_fr
            label: Balise Alt SEO (Français)
            type: string
          - name: alt_en
            label: Balise Alt SEO (English)
            type: string
          - name: alt_en_au
            label: Balise Alt SEO (English AU)
            type: string
          - name: alt_de
            label: Balise Alt SEO (Deutsch)
            type: string
          - name: alt_it
            label: Balise Alt SEO (Italiano)
            type: string
          - name: alt_es
            label: Balise Alt SEO (Español)
            type: string
          - name: alt_ru
            label: Balise Alt SEO (Русский)
            type: string
